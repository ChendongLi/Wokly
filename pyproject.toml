[tool.ruff]
target-version = "py312"
line-length = 100
src = ["backend"]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "UP",  # pyupgrade
]
# E501 line-length is enforced by ruff-format instead
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"backend/tests/*" = ["F841"]  # allow unused vars in test helpers

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
