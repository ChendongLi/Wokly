services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8000:8080'
    env_file: .env
    volumes:
      - ./backend:/app
      - wokly_db:/app/data
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - '5173:5173'
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  wokly_db:
